<div class="col-sm-6 col-xl">
  <div class="kpi-card" style="background:{{ bg }};">
    <div class="d-flex align-items-center gap-3">
      <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width:44px;height:44px;background:{{ color }}20;">
        <i class="{{ icon }}" style="font-size:1.2rem;color:{{ color }};"></i>
      </div>
      <div>
        <p class="kpi-n mb-0" style="color:{{ color }};">{{ valeur }}</p>
        <p class="kpi-l mb-0" style="color:{{ color }};">{{ label }}</p>
      </div>
    </div>
  </div>
</div>
