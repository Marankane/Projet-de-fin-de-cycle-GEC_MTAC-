<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erreur {{ status_code }} - GED Courriers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #fff7ed 0%, #ffffff 50%, #ecfdf5 100%);
      color: #1f2937;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <main class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <section class="card shadow-sm border-0" style="max-width: 680px; width: 100%;">
      <div class="card-body p-4 p-md-5">
        <div class="d-flex align-items-center gap-3 mb-3">
          <div class="rounded-circle bg-warning-subtle text-warning d-flex align-items-center justify-content-center" style="width: 52px; height: 52px;">
            <i class="bi bi-exclamation-triangle-fill fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">GED Courriers</div>
            <h1 class="h4 mb-0">Erreur {{ status_code }}</h1>
          </div>
        </div>

        <p class="lead mb-3">{{ message }}</p>
        {% if request_path %}
          <p class="text-muted small mb-4">Chemin concerne : <code>{{ request_path }}</code></p>
        {% endif %}

        {% if show_details and exception %}
          <div class="alert alert-light border small">
            <strong>Detail technique :</strong> {{ exception }}
          </div>
        {% endif %}

        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-primary" href="{% url 'dashboard:accueil' %}">
            <i class="bi bi-speedometer2 me-1"></i> Tableau de bord
          </a>
          <a class="btn btn-outline-secondary" href="javascript:history.back()">
            <i class="bi bi-arrow-left me-1"></i> Retour
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
